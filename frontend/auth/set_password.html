<!DOCTYPE html>
<html>
<head>
  <title>Set Password</title>
  <link rel="stylesheet" href="/static/auth/auth.css">
</head>
<body>

<div class="panel-right" style="margin:auto">

  <div class="auth-form-wrap">
    <h2>Create Password</h2>
    <p>Set a password to enable email login</p>

    <div class="field-group">
      <label>Password</label>
      <input type="password" id="newPassword">
    </div>

    <div class="field-group">
      <label>Confirm Password</label>
      <input type="password" id="confirmPassword">
    </div>

    <button class="primary-btn" onclick="setPassword()">
      Save Password
    </button>

    <p id="msg" class="msg"></p>
  </div>

</div>

<script>
async function setPassword() {
  const p1 = document.getElementById("newPassword").value;
  const p2 = document.getElementById("confirmPassword").value;
  const msg = document.getElementById("msg");

  if (p1 !== p2) {
    msg.innerText = "Passwords do not match";
    msg.style.color = "red";
    return;
  }

  const res = await fetch("/auth/set-password", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ password: p1 })
  });

  const data = await res.json();

  if (res.ok) {
    window.location.href = "/dashboard";
  } else {
    msg.innerText = data.detail;
  }
}
</script>

</body>
</html>
